  <text x="70" y="88" fill="#fff1dd" font-size="52" font-family="Georgia, serif">Festival Of Frost</text>
  <text x="72" y="126" fill="#c7ebe8" font-size="23" font-family="'Trebuchet MS', sans-serif">All three snowman bands staged as one surreal yard concert with mirrored paths, reactive lanes, aurora ribbons, canopy stars, and motion-rich side scenery.</text>

  <g filter="url(#softShadow)">
    <rect x="62" y="714" width="470" height="138" rx="26" fill="#142530" opacity="0.85"/>
    <text x="92" y="752" fill="#fff1dd" font-size="24" font-family="'Trebuchet MS', sans-serif">Layout Story</text>
    <text x="92" y="782" fill="#d6ebef" font-size="18" font-family="'Trebuchet MS', sans-serif">Left stage: Snowcap Swing in warm brass.</text>
    <text x="92" y="808" fill="#d6ebef" font-size="18" font-family="'Trebuchet MS', sans-serif">Center stage: Aurora Echo as the cinematic hero.</text>
    <text x="92" y="834" fill="#d6ebef" font-size="18" font-family="'Trebuchet MS', sans-serif">Right stage: Candy Cabaret for joyful chaos and crowd-pleasing color.</text>

    <rect x="1078" y="714" width="460" height="138" rx="26" fill="#183427" opacity="0.84"/>
    <text x="1108" y="752" fill="#fff1dd" font-size="24" font-family="'Trebuchet MS', sans-serif">Effect Spine</text>
    <text x="1108" y="782" fill="#e1f7ea" font-size="18" font-family="'Trebuchet MS', sans-serif">Arches and canes become pitch rivers between stages.</text>
    <text x="1108" y="808" fill="#e1f7ea" font-size="18" font-family="'Trebuchet MS', sans-serif">Mega trees and matrices act like chorus halos and sky curtains.</text>
    <text x="1108" y="834" fill="#e1f7ea" font-size="18" font-family="'Trebuchet MS', sans-serif">All additions live on the overlay/null side, not inside the 256 AC base.</text>
  </g>

