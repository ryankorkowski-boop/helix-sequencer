<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="skyFest" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08141d"/>
      <stop offset="35%" stop-color="#16324c"/>
      <stop offset="70%" stop-color="#5a2043"/>
      <stop offset="100%" stop-color="#132d28"/>
    </linearGradient>
    <linearGradient id="auroraFestA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#69f0d1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#69f0d1" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#69f0d1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="auroraFestB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9dc6ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#9dc6ff" stop-opacity="0.48"/>
      <stop offset="100%" stop-color="#9dc6ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="auroraFestC" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd184" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffd184" stop-opacity="0.36"/>
      <stop offset="100%" stop-color="#ffd184" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="stageGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff0d4" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#d78e4c" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#051014" flood-opacity="0.4"/>
    </filter>
    <pattern id="pepStripe" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect width="20" height="20" fill="#fff"/>
      <rect width="10" height="20" fill="#d84c4c"/>
    </pattern>
  </defs>

