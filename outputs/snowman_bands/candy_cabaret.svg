  <text x="72" y="84" fill="#fff3e7" font-size="46" font-family="Georgia, serif">Candy Cabaret</text>
  <text x="72" y="120" fill="#ffe28d" font-size="20" font-family="'Trebuchet MS', sans-serif">Showiest version: candy-striped instruments, peppermint drums, big scarf motion, and playful front-of-yard energy.</text>

