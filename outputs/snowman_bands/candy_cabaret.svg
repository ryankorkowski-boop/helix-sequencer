      <stop offset="45%" stop-color="#7f1d2a"/>
      <stop offset="100%" stop-color="#1f5a44"/>
    </linearGradient>
    <pattern id="caneStripe" width="18" height="18" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect width="18" height="18" fill="#ffffff"/>
      <rect width="9" height="18" fill="#d93b3b"/>
    </pattern>
    <linearGradient id="mintGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eafff2"/>
      <stop offset="100%" stop-color="#7ff1b3"/>
    </linearGradient>
    <filter id="stageShadow" x="-20%" y="-20%" width="140%" height="140%">
