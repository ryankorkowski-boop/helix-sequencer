name: Helix CI

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: helix-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-hygiene:
    name: Source hygiene gate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block audit-questionable retained guidance
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking for retained source-derived guidance markers..."
          blocked_regex='training_mode|training_use|vendor benchmark|YouTube-grade|YouTube-style|creator-specific|source-specific choreography|paid sequence training|transcript dump|preview_and_metadata|own_generated_only|vendor_manifest'

          # Policy and roadmap docs are allowed to mention risky source categories
          # only as prohibitions. Active guidance/data/code elsewhere should not.
          allowlisted_paths=(
            './docs/legal_learning_policy.md'
            './agents/legal_learning_policy.agents.md'
            './docs/HELIX_PRODUCT_VISION.md'
            './docs/HELIX_IMPLEMENTATION_ROADMAP.md'
            './docs/HELIXIA_LAYOUT_DIRECTION.md'
            './agents/helix_implementation_direction.agents.md'
          )

          grep_args=(
            -RInE "$blocked_regex"
            --include='*.md'
            --include='*.py'
            --include='*.json'
            --exclude-dir='.git'
            --exclude-dir='test_runs'
            --exclude-dir='outputs'
          )

          for path in "${allowlisted_paths[@]}"; do
            grep_args+=(--exclude="${path#./}")
          done

          if grep "${grep_args[@]}" .; then
            echo "::error::Found audit-questionable source/training language outside policy/roadmap allowlist. Remove or rewrite as source-agnostic policy."
            exit 1
          fi
          echo "Source hygiene gate passed."

  tests:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: source-hygiene

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest numpy scipy scikit-learn librosa soundfile numba llvmlite

      - name: Compile Python files
        run: |
          python -m compileall -q .

      - name: Run full unit test suite
        env:
          PYTHONPATH: .
        run: |
          python -m pytest

  roadmap-smoke:
    name: Roadmap smoke gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest numpy scipy scikit-learn librosa soundfile numba llvmlite

      - name: Run Helix roadmap-targeted tests when present
        shell: bash
        env:
          PYTHONPATH: .
        run: |
          set -euo pipefail
          tests_to_run=()
          for test_file in \
            tests/test_helixia_layout.py \
            tests/test_professional_sequence_intelligence.py \
            tests/test_core_sandbox.py \
            tests/test_build_helpers.py; do
            if [[ -f "$test_file" ]]; then
              tests_to_run+=("$test_file")
            fi
          done

          if (( ${#tests_to_run[@]} == 0 )); then
            echo "No roadmap-targeted tests found yet. Full suite already ran."
            exit 0
          fi

          printf 'Running roadmap-targeted tests:\n'
          printf ' - %s\n' "${tests_to_run[@]}"
          python -m pytest "${tests_to_run[@]}" -q
