name: Unit Tests

on:
  pull_request:
  push:
    branches:
      - "**"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy scikit-learn librosa soundfile numba llvmlite

      - name: Run unit tests
        run: |
          python - <<'PY'
          import importlib
          import subprocess
          import sys

          modules = [
              "tests.test_effects",
              "tests.test_sequence_builder",
              "tests.test_build_helpers",
          ]

          try:
              audio_mod = importlib.import_module("core.audio_intelligence")
              if hasattr(audio_mod, "normalize_name") and hasattr(audio_mod, "ordered_spatial_path"):
                  modules.append("tests.test_audio")
          except Exception:
              pass

          try:
              importlib.import_module("core.feature_state")
              importlib.import_module("tests.test_feature_state")
              modules.append("tests.test_feature_state")
          except Exception:
              pass

          cmd = [sys.executable, "-m", "unittest", *modules]
          print("Running:", " ".join(cmd))
          raise SystemExit(subprocess.call(cmd))
          PY
