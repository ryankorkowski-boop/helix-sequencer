name: Unit Tests

on:
  pull_request:
  push:
    branches:
      - "**"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy scikit-learn librosa soundfile numba llvmlite

      - name: Run unit tests
        run: |
          python - <<'PY'
          import importlib
          import subprocess
          import sys

          modules = []
          candidates = [
              "tests.test_sequence_builder",
              "tests.test_effects",
              "tests.test_build_helpers",
              "tests.test_audio",
              "tests.test_feature_state",
          ]
          for candidate in candidates:
              try:
                  importlib.import_module(candidate)
              except Exception as exc:
                  print(f"Skipping {candidate}: {exc}")
                  continue
              modules.append(candidate)
          if not modules:
              modules = ["tests.test_sequence_builder"]

          cmd = [sys.executable, "-m", "unittest", *modules]
          print("Running:", " ".join(cmd))
          raise SystemExit(subprocess.call(cmd))
          PY
