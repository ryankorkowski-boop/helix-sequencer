name: Helix Beta CI

on:
  pull_request:
  push:
    branches:
      - feature/restructure-core
      - 'codex/**'
      - 'feature/**'
      - 'beta/**'

jobs:
  beta-smoke:
    name: beta smoke / python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install declared dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall core ai xlights tools tests main.py gui_launcher.py

      - name: List sequencing profiles
        run: python main.py --list-profiles

      - name: Run tests
        run: python -m pytest -q
