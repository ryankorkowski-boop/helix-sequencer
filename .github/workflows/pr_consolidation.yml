name: PR Consolidation Runner

on:
  workflow_dispatch:
    inputs:
      execute:
        description: 'Execute merges (true) or dry-run (false)'
        required: true
        default: 'false'
      include_drafts:
        description: 'Include draft PRs in consolidation'
        required: false
        default: 'false'

permissions:
  pull-requests: write
  contents: read

jobs:
  consolidate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Ensure python tooling
        run: |
          python -m pip install --upgrade pip

      - name: Install gh CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Authenticate gh (for live execute)
        if: ${{ inputs.execute == 'true' }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Run consolidation script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.execute }}" = "true" ]; then
            echo "Running in LIVE execute mode"
            python tools/consolidate_prs.py --execute $( [ "${{ inputs.include_drafts }}" = "true" ] && echo "--include-drafts" )
          else
            echo "Running in DRY-RUN mode"
            python tools/consolidate_prs.py --dry-run
          fi
